########## start => Config postgresql ##########
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/notification_db
    username: postgres
    password: admin
    # password: Pa$$w0rd!
    # driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

  cloud:
    # C'est pas la peine d'essayer de te connecter vers le Config server(8888) car nous avons pas encore mit en place ce service
#    config:
#      enabled: true
    discovery:
      # C'est pas la peine d'essayer de te connecter vers le Discovery service(Eureka server 8761) car nous avons pas encore mit en place ce service
      enabled: true

  data:
    rest:
      base-path: /api/v1

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true